<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tracer Print</title>
  <link rel="stylesheet" href="./tracerprint.css">
</head>
<body class="a4">
  <div class="page-controls no-print">
    <div class="control-group">
      <label for="paperSize">Paper size</label>
      <select id="paperSize">
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
      </select>
    </div>
    <div class="control-group">
      <button id="printButton" class="action-btn">Print</button>
    </div>
  </div>

  <div class="print-page" id="printPage">
    <div class="print-header">
      <div class="seal seal-left" aria-hidden="true">
        <img src="./logo.svg" alt="City logo" class="seal-mark" />
      </div>
      <div class="print-title-group">
        <div class="subtitle">Republic of the Philippines</div>
        <div class="subtitle">City of Toledo</div>
        <div class="separator">-oOo-</div>
        <div class="main-title">OFFICE OF THE CITY ASSESSOR</div>
        <div class="document-title">TRACER</div>
      </div>
      <div class="seal seal-right" aria-hidden="true">
        <img src="./Assessor.png" alt="Assessor logo" class="seal-mark" />
      </div>
    </div>

    <div class="table-wrapper">
      <table class="tracer-table" id="tracerTable">
        <thead>
          <tr>
            <th>TD. NO</th>
            <th>DECLARANT</th>
            <th>LOCATION</th>
            <th>LOT NO.</th>
            <th>AREA</th>
            <th>P.I.N.</th>
            <th>CONVEYANCE</th>
            <th>EFF.</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
        </tbody>
      </table>
    </div>

    <div class="print-footer">
      <div class="footer-note">Toledo City Assessor Office</div>
      <div class="footer-meta" id="footerMeta"></div>
    </div>
  </div>

  <script src="./tracerprint.js"></script>
</body>
</html>
